---
- name: Install Docker Engine for ProxySQL container
  ansible.builtin.apt:
    name:
      - docker.io
      - mysql-client
    state: present

- name: Ensure Docker service is started and enabled
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Create ProxySQL base directory
  ansible.builtin.file:
    path: /opt/proxysql
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create ProxySQL SSL directory
  ansible.builtin.file:
    path: /opt/proxysql/ssl
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create ProxySQL data directory
  ansible.builtin.file:
    path: /opt/proxysql/data
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Copy CA certificate to ProxySQL node
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/artifacts/certs/ca.pem"
    dest: /opt/proxysql/ssl/ca.pem
    owner: root
    group: root
    mode: "0644"

- name: Copy ProxySQL certificate
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/artifacts/certs/{{ inventory_hostname }}-cert.pem"
    dest: /opt/proxysql/ssl/proxy-cert.pem
    owner: root
    group: root
    mode: "0644"

- name: Copy ProxySQL private key
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/artifacts/certs/{{ inventory_hostname }}-key.pem"
    dest: /opt/proxysql/ssl/proxy-key.pem
    owner: root
    group: root
    mode: "0600"

- name: Pull ProxySQL container image
  ansible.builtin.command: docker pull proxysql/proxysql:2.6.2
  changed_when: false

- name: Restart ProxySQL container
  ansible.builtin.shell: |
    docker rm -f proxysql 2>/dev/null || true
    docker run -d \
      --name proxysql \
      --restart unless-stopped \
      -p 6032:6032 \
      -p 6033:6033 \
      -v /opt/proxysql/data:/var/lib/proxysql \
      -v /opt/proxysql/ssl:/etc/proxysql/ssl \
      proxysql/proxysql:2.6.2
  args:
    executable: /bin/bash

- name: Wait for ProxySQL admin interface to be available
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 6032
    timeout: 60

- name: Render ProxySQL bootstrap SQL
  ansible.builtin.template:
    src: proxysql-bootstrap.sql.j2
    dest: /tmp/proxysql-bootstrap.sql
    owner: root
    group: root
    mode: "0600"

- name: Apply ProxySQL read/write split configuration
  ansible.builtin.shell: |
    cat /tmp/proxysql-bootstrap.sql | docker exec -i proxysql mysql -uadmin -padmin -h127.0.0.1 -P6032 --protocol=tcp
  args:
    executable: /bin/bash
  register: proxysql_bootstrap
  changed_when: true
  failed_when: proxysql_bootstrap.rc != 0

- name: Validate ProxySQL listener port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 6033
    timeout: 30
